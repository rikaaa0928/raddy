name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.tls_backend }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_zigbuild: true
            tls_backend: openssl
            features: vendored
            archive_name: raddy-openssl-linux-x86_64.tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_zigbuild: true
            tls_backend: boringssl
            features: boringssl
            archive_name: raddy-boringssl-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_zigbuild: true
            tls_backend: openssl
            features: vendored
            archive_name: raddy-openssl-linux-aarch64.tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_zigbuild: true
            tls_backend: boringssl
            features: boringssl
            archive_name: raddy-boringssl-linux-aarch64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest # Apple Silicon (Cross-compile to x86_64)
            use_zigbuild: false
            tls_backend: openssl
            features: openssl
            archive_name: raddy-openssl-darwin-x86_64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest # Apple Silicon (Cross-compile to x86_64)
            use_zigbuild: false
            tls_backend: boringssl
            features: boringssl
            archive_name: raddy-boringssl-darwin-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest # Apple Silicon
            use_zigbuild: false
            tls_backend: openssl
            features: openssl
            archive_name: raddy-openssl-darwin-aarch64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest # Apple Silicon
            use_zigbuild: false
            tls_backend: boringssl
            features: boringssl
            archive_name: raddy-boringssl-darwin-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_zigbuild: false
            tls_backend: openssl
            features: openssl
            archive_name: raddy-openssl-windows-x86_64.zip
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_zigbuild: false
            tls_backend: boringssl
            features: boringssl
            archive_name: raddy-boringssl-windows-x86_64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig and cargo-zigbuild
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: cargo install cargo-zigbuild

      - name: Install TLS build dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libclang-dev libssl-dev ninja-build perl pkg-config

      - name: Install BoringSSL build dependencies (macOS)
        if: matrix.os == 'macos-latest' && matrix.tls_backend == 'boringssl'
        run: |
          brew install cmake ninja

      - name: Install OpenSSL (Windows)
        if: matrix.os == 'windows-latest' && matrix.tls_backend == 'openssl'
        shell: pwsh
        run: |
          vcpkg install openssl:x64-windows-static
          $vcpkgRoot = "C:\vcpkg\installed\x64-windows-static"
          echo "OPENSSL_DIR=$vcpkgRoot" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$vcpkgRoot\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$vcpkgRoot\include" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
          echo "OPENSSL_NO_VENDOR=1" >> $env:GITHUB_ENV

      - name: Install BoringSSL build dependencies (Windows)
        if: matrix.os == 'windows-latest' && matrix.tls_backend == 'boringssl'
        shell: pwsh
        run: |
          choco install cmake llvm ninja strawberryperl --no-progress
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}
          else
            cargo build --release --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}
          fi

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../${{ matrix.archive_name }} raddy

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path raddy.exe -DestinationPath ..\..\..\${{ matrix.archive_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            raddy-*/*
          generate_release_notes: true
          draft: false
          prerelease: false
